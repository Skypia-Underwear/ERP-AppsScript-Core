  <script>
    let INITIAL_PARAMS = {};
    try {
      const raw = '';
      if (raw && raw !== 'undefined') {
        try {
          INITIAL_PARAMS = JSON.parse(raw);
        } catch (e) {
          console.warn("[Shell] JSON.parse fallo, intentando limpieza basica...");
          const cleaned = raw.trim().replace(/^['"]|['"]$/g, '');
          if (cleaned.startsWith('{')) INITIAL_PARAMS = JSON.parse(cleaned);
        }
      }
      console.log("[Shell] Params iniciales:", INITIAL_PARAMS);
    } catch (e) {
      console.warn("[Shell] Error critico recuperando INITIAL_PARAMS:", e.message);
    }

    function setGlobalStatus(show, text) {
      const container = document.getElementById('shell-status');
      const textEl = document.getElementById('shell-status-text');
      if (container) container.classList.toggle('hidden', !show);
      if (textEl && text) textEl.innerText = text;
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('main-sidebar');
      if (window.innerWidth < 768) {
        sidebar.classList.toggle('open');
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }

    var CATALOG_URL = 'https://castfer.com.ar/api_json_read.php?file=castfersystemv1-201513855-catalog-tpv.json';
    var CATALOG_URL_FALLBACK = 'https://raw.githubusercontent.com/Skypia-Underwear/api-tienda/main/castfersystemv1-201513855-catalog-tpv.json';
    window.catalogFetchPromise = null;
    window.cachedCatalogData = null;

    window.getGlobalCatalog = function (readUrl, fallbackUrl) {
      const rUrl = readUrl || CATALOG_URL;
      const fUrl = fallbackUrl || CATALOG_URL_FALLBACK;
      if (window.catalogFetchPromise) return window.catalogFetchPromise;

      window.catalogFetchPromise = (async () => {
        let initialData = null;
        console.log("[Global Fetch] Estrategia Stale-while-revalidate iniciada.");
        try {
          if (!rUrl || rUrl.length < 5) throw new Error("URL no valida");
          console.log("[Global Fetch] Solicitando a Donweb...");
          const response = await fetch(rUrl);
          if (response.ok) {
            initialData = await response.json();
            window.cachedCatalogData = initialData;
            console.log("[Global Fetch] Catalogo cargado desde Donweb.");
          } else {
            throw new Error("Donweb fallo");
          }
        } catch (e) {
          console.warn("[Global Fetch] Fallo en Donweb, recurriendo a Github...", e.message);
          try {
            const fbResponse = await fetch(fUrl);
            if (fbResponse.ok) {
              initialData = await fbResponse.json();
              window.cachedCatalogData = initialData;
              console.log("[Global Fetch] Catalogo cargado desde Github.");
            }
          } catch (errFb) {
            console.error("[Global Fetch] Fallo total (Donweb/Github).");
          }
        }

        setTimeout(() => {
          console.log("[Global Fetch] Sincronizando con Drive...");
          google.script.run
            .withSuccessHandler(res => {
              if (res && res.success && res.catalog) {
                const driveData = res.catalog;
                const driveTime = driveData.timestamp_ms || 0;
                const localTime = window.cachedCatalogData ? (window.cachedCatalogData.timestamp_ms || 0) : 0;
                if (driveTime > localTime || !window.cachedCatalogData) {
                  console.log("[Global Fetch] Nueva version detectada en Drive. Actualizando...");
                  window.cachedCatalogData = driveData;
                  window.catalogFetchPromise = Promise.resolve(driveData);
                  window.dispatchEvent(new CustomEvent('catalogUpdated', { detail: driveData }));
                } else {
                  console.log("[Global Fetch] Catalogo actualizado.");
                }
              }
            })
            .withFailureHandler(err => console.error("[Global Fetch] Fallo en sincronizacion:", err.message))
            .tpv_obtenerCatalogoDesdeDrive();
        }, 100);

        return initialData || new Promise((resolve, reject) => {
          google.script.run.withSuccessHandler(res => resolve(res.catalog)).withFailureHandler(reject).tpv_obtenerCatalogoDesdeDrive();
        });
      })();
      return window.catalogFetchPromise;
    };

    function navigate(viewName) { loadView(viewName, '', '', ''); }

    function loadView(view, accion, codigo, fecha, activeBtnId, customTitle) {
      if (isNavigating) return;
      isNavigating = true;
      showLoader();
      
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      const btn = document.getElementById(activeBtnId || 'btn-' + view);
      if (btn) btn.classList.add('active');

      google.script.run
        .withSuccessHandler(htmlContent => {
          const container = document.getElementById('app-container');
          if (typeof htmlContent === 'string' && htmlContent.trim().startsWith("Error")) {
            console.error("[Shell] Error en contenido:", htmlContent);
            container.innerHTML = `<div class="p-10 text-center text-white">Error: ${htmlContent}</div>`;
            hideLoader();
            return;
          }
          container.innerHTML = htmlContent;
          executeScripts(container);
          hideLoader();
          isNavigating = false;
        })
        .withFailureHandler(err => {
          hideLoader();
          isNavigating = false;
          console.error("Fallo carga:", err.message);
        })
        .getPageContent(view, accion, codigo, fecha, true);
    }

    let isNavigating = false;

    function executeScripts(container) {
      console.log("[Shell] Ejecutando scripts...");
      const scripts = Array.from(container.querySelectorAll("script"));
      for (const oldScript of scripts) {
        try {
          const newScript = document.createElement("script");
          for (const attr of Array.from(oldScript.attributes)) {
            newScript.setAttribute(attr.name, attr.value);
          }
          if (oldScript.src) {
            if (document.querySelector(`script[src="${oldScript.src}"]`)) continue;
            newScript.src = oldScript.src;
            newScript.async = false;
          } else {
            newScript.text = oldScript.textContent || oldScript.text || "";
          }
          const parent = oldScript.parentNode;
          if (parent) {
            parent.insertBefore(newScript, oldScript);
            parent.removeChild(oldScript);
          }
        } catch (e) {
          console.error("[Shell] Error inyectando script:", e);
        }
      }
    }

    function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

    function logout() {
      console.log("[Shell] Cerrando sesion...");
      sessionStorage.clear();
      window.location.replace("<?= ScriptApp.getService().getUrl() ?>");
    }

    function handleInitialRoute() {
      console.log("[Shell] Iniciando ruteo...");
      const userStr = sessionStorage.getItem('loggedInUser');
      const user = userStr ? JSON.parse(userStr) : null;
      if (!user) {
        loadView('login', '', '', '', '', 'Login');
        return;
      }
      const userNameEl = document.getElementById('user-name');
      if (userNameEl) userNameEl.innerText = user.name;
      window.getGlobalCatalog(CATALOG_URL, CATALOG_URL_FALLBACK);
      navigate('welcome');
    }

    window.onload = handleInitialRoute;
  </script>
