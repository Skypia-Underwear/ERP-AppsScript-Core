  <script>
    let INITIAL_PARAMS = {};
    try {
      const raw = '<?!= initialParams ?>';
      if (raw && raw !== 'undefined') {
        try {
          INITIAL_PARAMS = JSON.parse(raw);
        } catch (e) {
          console.warn("[Shell] JSON.parse fallo, intentando limpieza basica...");
          const cleaned = raw.trim().replace(/^['"]|['"]$/g, '');
          if (cleaned.startsWith('{')) INITIAL_PARAMS = JSON.parse(cleaned);
        }
      }
      console.log("[Shell] Params iniciales:", INITIAL_PARAMS);
    } catch (e) {
      console.warn("[Shell] Error critico recuperando INITIAL_PARAMS:", e.message);
    }

    function setGlobalStatus(show, text) {
      const container = document.getElementById('shell-status');
      const textEl = document.getElementById('shell-status-text');
      if (container) container.classList.toggle('hidden', !show);
      if (textEl && text) textEl.innerText = text;
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('main-sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      if (window.innerWidth < 768) {
        const isOpen = sidebar.classList.toggle('open');
        if (backdrop) {
          backdrop.classList.toggle('hidden', !isOpen);
        }
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }

    var CATALOG_URL = "<?!= CATALOG_URL ?>";
    var CATALOG_URL_FALLBACK = "<?!= CATALOG_URL_FALLBACK ?>";
    window.catalogFetchPromise = null;
    window.cachedCatalogData = null;

    window.getGlobalCatalog = function (readUrl, fallbackUrl) {
      const rUrl = readUrl || CATALOG_URL;
      const fUrl = fallbackUrl || CATALOG_URL_FALLBACK;
      if (window.catalogFetchPromise) return window.catalogFetchPromise;

      window.catalogFetchPromise = (async () => {
        let initialData = null;
        console.log("[Global Fetch] Estrategia Stale-while-revalidate iniciada.");
        
        // Validar que las URLs estén configuradas, comiencen estrictamente con 'http' y no tengan valores por defecto
        const isDonwebValid = rUrl && typeof rUrl === 'string' && rUrl.trim().startsWith('http') && !rUrl.includes("tudominio.com");
        const isGithubValid = fUrl && typeof fUrl === 'string' && fUrl.trim().startsWith('http') && !fUrl.includes("tudominio.com");

        if (isDonwebValid) {
          try {
            console.log("[Global Fetch] Solicitando a Donweb...");
            const response = await fetch(rUrl);
            if (response.ok) {
              initialData = await response.json();
              window.cachedCatalogData = initialData;
              console.log("[Global Fetch] Catalogo cargado desde Donweb.");
            } else {
              throw new Error("Donweb fallo");
            }
          } catch (e) {
            console.warn("[Global Fetch] Fallo en Donweb, recurriendo a Github...", e.message);
            if (isGithubValid) {
              try {
                const fbResponse = await fetch(fUrl);
                if (fbResponse.ok) {
                  initialData = await fbResponse.json();
                  window.cachedCatalogData = initialData;
                  console.log("[Global Fetch] Catalogo cargado desde Github.");
                }
              } catch (errFb) {
                console.error("[Global Fetch] Fallo total (Donweb/Github).");
              }
            }
          }
        } else if (isGithubValid) {
          try {
            console.log("[Global Fetch] Solicitando a Github...");
            const fbResponse = await fetch(fUrl);
            if (fbResponse.ok) {
              initialData = await fbResponse.json();
              window.cachedCatalogData = initialData;
              console.log("[Global Fetch] Catalogo cargado desde Github.");
            }
          } catch (errFb) {
            console.error("[Global Fetch] Fallo total en Github.");
          }
        }

        // Si obtuvimos datos de Donweb/Github, hacemos la sincronización con Drive en segundo plano de forma segura
        if (initialData) {
          if (typeof processNewProductsNotifications === 'function') {
            processNewProductsNotifications(initialData.products);
          }
          setTimeout(() => {
            console.log("[Global Fetch] Sincronizando con Drive en segundo plano...");
            google.script.run
              .withSuccessHandler(res => {
                if (res && res.success && res.catalog) {
                  const driveData = res.catalog;
                  const driveTime = driveData.timestamp_ms || 0;
                  const localTime = window.cachedCatalogData ? (window.cachedCatalogData.timestamp_ms || 0) : 0;
                  if (driveTime > localTime) {
                    console.log("[Global Fetch] Nueva version detectada en Drive. Actualizando cache...");
                    window.cachedCatalogData = driveData;
                    window.dispatchEvent(new CustomEvent('catalogUpdated', { detail: driveData }));
                  } else {
                    console.log("[Global Fetch] Catalogo de Drive sincronizado (sin cambios).");
                  }
                }
              })
              .withFailureHandler(err => console.warn("[Global Fetch] Advertencia en sincronizacion de Drive:", err.message))
              .tpv_obtenerCatalogoDesdeDrive();
          }, 1000); // Margen de seguridad de 1 segundo para evitar competencia
          
          return initialData;
        }

        // Si ambos fallaron o no están configurados, recurrimos de inmediato a Drive Fast como fuente principal
        console.log("[Global Fetch] Donweb/Github inactivos o fallidos. Activando Drive Fast de inmediato...");
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(res => {
              if (res && res.success && res.catalog) {
                console.log("[Global Fetch] Catalogo cargado exitosamente desde Drive Fast.");
                window.cachedCatalogData = res.catalog;
                if (typeof processNewProductsNotifications === 'function') {
                  processNewProductsNotifications(res.catalog.products);
                }
                resolve(res.catalog);
              } else {
                const errMsg = (res && res.message) ? res.message : "Error desconocido recuperando catalogo de Drive.";
                console.error("[Global Fetch] Drive Fast falló: " + errMsg);
                reject(new Error(errMsg));
              }
            })
            .withFailureHandler(err => {
              console.error("[Global Fetch] Fallo critico en llamada a Drive Fast:", err.message);
              reject(err);
            })
            .tpv_obtenerCatalogoDesdeDrive();
        });
      })();
      return window.catalogFetchPromise;
    };

    function navigate(viewName) { loadView(viewName, '', '', ''); }

    function loadView(view, accion, codigo, fecha, activeBtnId, customTitle) {
      window.currentView = view;
      if (isNavigating) return;
      isNavigating = true;
      showLoader();

      // Control de visibilidad de Sidebar y Navegación según la vista
      const sidebar = document.getElementById('main-sidebar');
      const mobileNav = document.getElementById('mobile-bottom-nav');
      const mobileMenuFab = document.getElementById('mobile-menu-fab');
      if (view === 'login') {
        sidebar.classList.add('hidden');
        if (mobileNav) mobileNav.classList.add('hidden');
        if (mobileMenuFab) mobileMenuFab.classList.add('hidden');
      } else {
        sidebar.classList.remove('hidden');
        if (mobileNav) mobileNav.classList.remove('hidden');
        if (mobileMenuFab) mobileMenuFab.classList.remove('hidden');
      }
      
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item-mobile').forEach(el => el.classList.remove('active'));
      
      const btn = document.getElementById(activeBtnId || 'btn-' + view);
      if (btn) btn.classList.add('active');

      const mobileBtn = document.getElementById('m-btn-' + view);
      if (mobileBtn) mobileBtn.classList.add('active');

      // Cerrar sidebar en movil tras navegar
      if (window.innerWidth < 768) {
        document.getElementById('main-sidebar').classList.remove('open');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (backdrop) backdrop.classList.add('hidden');
      }

      google.script.run
        .withSuccessHandler(htmlContent => {
          const container = document.getElementById('app-container');
          if (typeof htmlContent === 'string' && htmlContent.trim().startsWith("Error")) {
            console.error("[Shell] Error en contenido:", htmlContent);
            container.innerHTML = `<div class="p-10 text-center text-white">Error: ${htmlContent}</div>`;
            hideLoader();
            return;
          }
          container.innerHTML = htmlContent;
          executeScripts(container);
          hideLoader();
          isNavigating = false;

          // \u2500\u2500\u2500 Notificar al Shell PWA que el ERP est\u00e1 listo \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
          // Se dispara solo en la primera vista cargada exitosamente.
          if (!erpReadyDispatched) {
            erpReadyDispatched = true;
            try {
              // IMPORTANTE: usar window.top (no window.parent) para saltar el
              // iframe warden de GAS (mae_html_user) que intercepta y descarta
              // los mensajes enviados con window.parent.
              window.top.postMessage({ type: 'ERP_READY' }, '*');
              console.info('[Shell] ERP_READY enviado al Shell PWA via window.top.');
            } catch (e) {
              console.warn('[Shell] No se pudo enviar ERP_READY:', e.message);
            }
          }
        })
        .withFailureHandler(err => {
          hideLoader();
          isNavigating = false;
          console.error("Fallo carga:", err.message);
        })
        .getPageContent(view, accion, codigo, fecha, true);
    }

    let isNavigating = false;
    let erpReadyDispatched = false; // Solo notificamos al Shell la primera vez

    function executeScripts(container) {
      console.log("[Shell] Ejecutando scripts...");
      const scripts = Array.from(container.querySelectorAll("script"));
      for (const oldScript of scripts) {
        try {
          const newScript = document.createElement("script");
          for (const attr of Array.from(oldScript.attributes)) {
            newScript.setAttribute(attr.name, attr.value);
          }
          if (oldScript.src) {
            if (document.querySelector(`script[src="${oldScript.src}"]`)) continue;
            newScript.src = oldScript.src;
            newScript.async = false;
          } else {
            newScript.text = oldScript.textContent || oldScript.text || "";
          }
          const parent = oldScript.parentNode;
          if (parent) {
            parent.insertBefore(newScript, oldScript);
            parent.removeChild(oldScript);
          }
        } catch (e) {
          console.error("[Shell] Error inyectando script:", e);
        }
      }
    }

    function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

    function logout() {
      console.log("[Shell] Cerrando sesion...");
      sessionStorage.clear();
      window.location.replace("<?= ScriptApp.getService().getUrl() ?>");
    }

    function handleInitialRoute() {
      console.log("[Shell] Iniciando ruteo...");
      const userStr = sessionStorage.getItem('loggedInUser');
      const user = userStr ? JSON.parse(userStr) : null;
      if (!user) {
        loadView('login', '', '', '', '', 'Login');
        return;
      }
      const userNameEl = document.getElementById('user-name');
      if (userNameEl) userNameEl.innerText = user.name;
      window.getGlobalCatalog(CATALOG_URL, CATALOG_URL_FALLBACK);
      navigate('welcome');
    }

    window.onload = handleInitialRoute;

    // --- GESTIÓN DE NOTIFICACIONES DE PRODUCTOS NUEVOS (RESELLER) ---
    const STORAGE_KEY = 'erp_reseller_notifications';

    function getNotifications() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        return [];
      }
    }

    function saveNotifications(notifications) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notifications));
      renderNotifications();
    }

    window.addNotification = function(product) {
      const sku = product.sku || product.id;
      const nombre = product.nombre || product.model || "Sin Nombre";
      const category = product.category || product.category_id || "";
      
      const notifications = getNotifications();
      const dismissed = JSON.parse(localStorage.getItem('erp_dismissed_notifications')) || [];
      
      if (!notifications.some(n => n.sku === sku) && !dismissed.includes(sku)) {
        notifications.unshift({
          sku: sku,
          nombre: nombre,
          category: category,
          timestamp: Date.now(),
          read: false
        });
        saveNotifications(notifications);
        
        // Alerta visual discreta (Toast)
        if (typeof Swal !== 'undefined') {
          Swal.fire({
            title: '¡Producto Nuevo!',
            text: `Se detectó el ingreso de ${sku} al sistema.`,
            icon: 'info',
            toast: true,
            position: 'top-end',
            timer: 6000,
            showConfirmButton: false,
            background: '#1e293b',
            color: '#fff'
          });
        }
      }
    };

    function processNewProductsNotifications(products) {
      if (!products || !Array.isArray(products)) return;
      
      const notifications = getNotifications();
      const dismissed = JSON.parse(localStorage.getItem('erp_dismissed_notifications')) || [];
      const dismissedSet = new Set(dismissed);
      const notificationsSet = new Set(notifications.map(n => n.sku));
      
      let addedAny = false;
      const now = Date.now();
      const maxAgeMs = 48 * 60 * 60 * 1000; // 48 horas (margen amplio)

      products.forEach(p => {
        const pid = p.sku || p.id;
        if (!pid) return;
        
        let isRecent = false;
        if (p.fecha_creacion) {
          try {
            const createTime = new Date(p.fecha_creacion).getTime();
            if (!isNaN(createTime) && (now - createTime) < maxAgeMs) {
              isRecent = true;
            }
          } catch(e) {}
        }

        if (isRecent && !notificationsSet.has(pid) && !dismissedSet.has(pid)) {
          notifications.unshift({
            sku: pid,
            nombre: p.model || p.nombre || "Sin Nombre",
            category: p.category_id || p.category || "",
            timestamp: p.fecha_creacion ? new Date(p.fecha_creacion).getTime() : now,
            read: false
          });
          notificationsSet.add(pid);
          addedAny = true;
        }
      });

      if (addedAny) {
        saveNotifications(notifications);
      }
    }

    function renderNotifications() {
      const notifications = getNotifications();
      const badgeEl = document.getElementById('notification-badge');
      
      const unreadCount = notifications.filter(n => !n.read).length;
      if (badgeEl) {
        if (unreadCount > 0) {
          badgeEl.innerText = unreadCount;
          badgeEl.classList.remove('hidden');
        } else {
          badgeEl.classList.add('hidden');
        }
      }

      // Si el modal de notificaciones está visible, actualizar su contenido dinámicamente
      if (typeof Swal !== 'undefined' && Swal.isVisible()) {
        const titleEl = Swal.getTitle();
        if (titleEl && titleEl.innerText.includes('Novedades')) {
          const htmlContainer = Swal.getHtmlContainer();
          if (htmlContainer) {
            htmlContainer.innerHTML = buildNotificationsHtml(notifications);
          }
        }
      }
    }

    function buildNotificationsHtml(notifications) {
      if (notifications.length === 0) {
        return `
          <div class="text-center py-6 text-slate-400 text-xs">
            <i class="ph-duotone ph-bell-simple text-3xl mb-2 block text-slate-500"></i>
            Sin novedades registradas
          </div>`;
      }
      
      return `
        <div class="flex flex-col gap-2 max-h-80 overflow-y-auto text-left pr-1 scrollbar-thin scrollbar-thumb-slate-700">
          ${notifications.map((n, idx) => `
            <div class="p-2.5 rounded-lg border border-slate-800 bg-slate-900/60 hover:bg-slate-800 transition-all duration-200 cursor-pointer flex items-start gap-2.5 relative ${n.read ? 'opacity-50' : ''}" 
                 onclick="window.openNotifiedProduct('${n.sku}', '${n.category || ''}', ${idx})">
              <div class="mt-0.5 p-1 rounded-md bg-indigo-500/10 text-indigo-400">
                <i class="ph-bold ph-package text-sm"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5 justify-between">
                  <span class="font-bold text-xs text-slate-200 truncate">${n.sku}</span>
                  <span class="text-[9px] text-slate-500">${new Date(n.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                </div>
                <p class="text-[10px] text-slate-400 truncate mt-0.5">${n.nombre}</p>
              </div>
              ${!n.read ? '<span class="absolute top-3 right-3 h-2 w-2 rounded-full bg-rose-500"></span>' : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    window.showNotificationsModal = function() {
      const notifications = getNotifications();
      const contentHtml = buildNotificationsHtml(notifications);
      
      Swal.fire({
        title: 'Novedades de Reventa',
        html: contentHtml,
        showCancelButton: notifications.length > 0,
        showConfirmButton: true,
        confirmButtonText: 'Cerrar',
        cancelButtonText: 'Limpiar todo',
        confirmButtonColor: '#4f46e5',
        cancelButtonColor: '#ef4444',
        background: '#1e293b',
        color: '#fff',
        customClass: {
          popup: 'rounded-xl border border-slate-700',
          title: 'text-lg font-bold text-white border-b border-slate-800 pb-3',
          htmlContainer: 'py-4',
        }
      }).then((result) => {
        if (result.dismiss === Swal.DismissReason.cancel) {
          window.clearNotifications();
          // Volver a abrir para mostrar el estado vacío
          window.showNotificationsModal();
        }
      });
    };

    window.openNotifiedProduct = function(sku, category, index) {
      const notifications = getNotifications();
      if (notifications[index]) {
        notifications[index].read = true;
        saveNotifications(notifications);
      }
      
      if (typeof Swal !== 'undefined') {
        Swal.close();
      }

      let targetView = window.currentView || 'inventory_dashboard';
      if (targetView !== 'inventory_dashboard' && targetView !== 'imagenes_manager') {
        targetView = 'inventory_dashboard';
      }

      console.log(`[Notification] Dirigiendo a la vista ${targetView} para el SKU ${sku}`);

      const triggerSearchInView = () => {
        setTimeout(() => {
          if (typeof window.openProductNotification === 'function') {
            window.openProductNotification(sku, category);
          } else {
            console.warn("[Notification] window.openProductNotification no está definida en la vista.");
          }
        }, 850);
      };

      if (window.currentView !== targetView) {
        navigate(targetView);
        triggerSearchInView();
      } else {
        if (typeof window.openProductNotification === 'function') {
          window.openProductNotification(sku, category);
        } else {
          triggerSearchInView();
        }
      }
    };

    window.clearNotifications = function() {
      const notifications = getNotifications();
      const dismissed = JSON.parse(localStorage.getItem('erp_dismissed_notifications')) || [];
      notifications.forEach(n => {
        if (!dismissed.includes(n.sku)) {
          dismissed.push(n.sku);
        }
      });
      localStorage.setItem('erp_dismissed_notifications', JSON.stringify(dismissed));
      saveNotifications([]);
    };

    // Inicializar listeners del panel de notificaciones
    document.addEventListener('DOMContentLoaded', () => {
      renderNotifications();
      
      // Limpiar caché desde menú lateral
      const clearCacheBtn = document.getElementById('sidebar-clear-cache-btn');
      if (clearCacheBtn) {
        clearCacheBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          
          Swal.fire({
            title: '¿Limpiar Caché del ERP?',
            text: "Esta acción borrará la caché local de productos y reiniciará la sesión con los datos más recientes del servidor.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#334155',
            confirmButtonText: 'Sí, limpiar caché',
            cancelButtonText: 'Cancelar',
            background: '#1e293b',
            color: '#fff'
          }).then((result) => {
            if (result.isConfirmed) {
              showLoader();
              setGlobalStatus(true, "Limpiando caché...");
              
              google.script.run
                .withSuccessHandler(res => {
                  hideLoader();
                  setGlobalStatus(false);
                  
                  // Limpiar almacenamiento local y recargar
                  localStorage.clear();
                  sessionStorage.clear();
                  
                  Swal.fire({
                    title: '¡Caché Limpiado!',
                    text: 'El sistema se reiniciará para cargar los datos limpios.',
                    icon: 'success',
                    confirmButtonColor: '#4f46e5',
                    background: '#1e293b',
                    color: '#fff'
                  }).then(() => {
                    window.location.replace("<?= ScriptApp.getService().getUrl() ?>");
                  });
                })
                .withFailureHandler(err => {
                  hideLoader();
                  setGlobalStatus(false);
                  Swal.fire({
                    title: 'Error',
                    text: 'No se pudo limpiar la caché: ' + err.message,
                    icon: 'error',
                    confirmButtonColor: '#4f46e5',
                    background: '#1e293b',
                    color: '#fff'
                  });
                })
                .clearSystemCache();
            }
          });
        });
      }
    });
  </script>
  <!-- Mobile Menu Floating Action Button (FAB) -->
  <button onclick="toggleSidebar()" id="mobile-menu-fab" title="Abrir Menú">
    <i class="ph-bold ph-list text-2xl"></i>
  </button>

  <!-- Sidebar Backdrop overlay for mobile drawer -->
  <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[105] hidden transition-all duration-300"></div>
</body>

</html>
