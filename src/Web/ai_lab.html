<!-- Estilos Experimentales para el Laboratorio -->

<div class="h-full flex flex-col bg-slate-950 p-4 overflow-hidden">

        AI LAB <span class="text-blue-500/50 text-sm">| Forensic School</span>

    </div>
    <div class="flex gap-2">
      <button onclick="resetLab()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-lg transition text-xs font-bold flex items-center gap-2">
        <span class="material-icons text-sm">layers_clear</span> LIMPIAR
      </button>
    </div>
  </div>

  <!-- Panel de Control (Buscador TPV - Compacto) -->
  <div class="glass-card p-4 rounded-xl mb-4 shadow-2xl shrink-0">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">1. Categoría</label>
        <select id="cat-selector" onchange="updateProductList()"
          class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2 text-sm outline-none focus:border-blue-500 transition">

        <div>
          <div id="stats-total" class="text-white font-bold text-sm leading-tight">0 Productos</div>
          <div class="text-blue-400/60 text-[9px] uppercase font-black">Catálogo Sincronizado</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Workspace del Laboratorio (Triple Columna) -->
  <div id="lab-workspace" class="flex-1 min-h-0 grid grid-cols-12 gap-4 hidden">
    <!-- Col 1: Galería (2/12) -->
    <div class="col-span-12 md:col-span-2 flex flex-col min-h-0">
      <div class="glass-card p-3 rounded-xl flex-1 flex flex-col overflow-hidden">
        <h3 class="text-white text-[10px] font-bold mb-3 flex items-center gap-2 uppercase tracking-wider shrink-0">
          <span class="material-icons text-sm text-blue-400">photo_library</span> Galería
        </h3>
        <div id="image-gallery" class="flex-1 overflow-y-auto pr-1 scroll-thin grid grid-cols-2 gap-2 content-start">
          <!-- Imágenes inyectadas aquí -->
        </div>
      </div>
    </div>

    <!-- Col 2: Selección y Acción (3/12) -->
    <div class="col-span-12 md:col-span-3 flex flex-col gap-4 min-h-0">
      <div class="glass-card rounded-xl overflow-hidden border border-blue-500/10 flex flex-col min-h-0">
        <!-- Preview de Imagen -->
        <div class="aspect-square bg-slate-900 flex items-center justify-center overflow-hidden shrink-0 border-b border-slate-800">
          <img id="selected-img-view" src="" class="w-full h-full object-cover" alt="">
        </div>
        
        <!-- Info y Botón -->
        <div class="p-4 flex-1 flex flex-col">
          <div class="mb-4">
            <div id="img-id-badge" class="inline-block bg-blue-500/20 text-blue-400 text-[9px] font-black px-2 py-0.5 rounded mb-1">ID: NO_SELECTED</div>
            <h2 id="prod-title-view" class="text-sm font-bold text-white uppercase truncate">Selecciona una imagen</h2>

          <div class="space-y-3 mt-auto">

              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-lg transition flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 group text-xs">
              <span class="material-icons text-sm group-hover:rotate-12 transition">biotech</span>
              ANALIZAR PRENDA
            </button>
            
            <!-- Espacio para futuras herramientas (Prompt Maestro, etc) -->
            <div class="pt-3 border-t border-slate-800/50">
              <p class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter text-center">Herramientas de Auditoría</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Col 3: Resultados Forenses (7/12) -->
    <div id="results-panel" class="col-span-12 md:col-span-7 hidden flex flex-col gap-4 min-h-0 animate-fadeIn">
      <!-- RAW: La mente de la IA (Top) -->
      <div class="flex-1 flex flex-col min-h-0">
        <div class="flex justify-between items-center mb-2 px-1 shrink-0">
          <h4 class="text-[10px] font-black text-rose-400 uppercase tracking-widest flex items-center gap-1">
            <span class="material-icons text-xs">psychology</span> Mente RAW <span class="text-slate-600 ml-1 font-mono">| Gemma 4</span>
          </h4>
          <button onclick="copyToClipboard('raw-view', 'MENTE DE LA IA (RAW)')"
            class="text-slate-500 hover:text-white transition flex items-center gap-1 text-[9px] uppercase font-bold">
            <span class="material-icons text-xs">content_copy</span> COPIAR
          </button>
        </div>
        <div id="raw-view" class="raw-console flex-1 p-4 rounded-xl text-[10px] leading-relaxed overflow-y-auto scroll-thin border border-rose-500/5">
          <!-- Texto RAW inyectado -->
        </div>
      </div>

      <!-- CLEAN: Resultado ERP (Bottom) -->
      <div class="flex-1 flex flex-col min-h-0">
        <div class="flex justify-between items-center mb-2 px-1 shrink-0">
          <h4 class="text-[10px] font-black text-emerald-400 uppercase tracking-widest flex items-center gap-1">
            <span class="material-icons text-xs">assignment_turned_in</span> Ficha ERP <span class="text-slate-600 ml-1 font-mono">| Output Final</span>
          </h4>
          <button onclick="copyToClipboard('clean-view', 'FICHA TÉCNICA (CLEAN)')"
            class="text-emerald-500/50 hover:text-emerald-400 transition flex items-center gap-1 text-[9px] uppercase font-bold">
            <span class="material-icons text-xs">content_copy</span> COPIAR
          </button>
        </div>
        <div id="clean-view" class="bg-slate-900 border border-slate-800 flex-1 p-4 rounded-xl overflow-y-auto scroll-thin">
          <!-- Resultado filtrado -->
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Inyección de URLs para modo Standalone
  var CATALOG_URL = "<?!= CATALOG_URL ?>";
  var CATALOG_URL_FALLBACK = "<?!= CATALOG_URL_FALLBACK ?>";

  let CATALOGO = [];
  let CATEGORIAS = new Set();
  let selectedImageId = null;
  let selectedProduct = null;

  // Inicialización robusta (Compatible con Shell SPA y Standalone)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    // Si el Shell ya cargó el DOM, ejecutamos inmediatamente con un pequeño delay de seguridad
    setTimeout(init, 100);
  }

  async function init() {
    console.log("🔬 [Lab-IA] Inicializando entorno de pruebas...");
    await loadCatalog();
  }

  // 1. CARGA DE CATALOGO (Dual: Shell SPA + Standalone Fallback)
  async function loadCatalog() {
    try {
      // Caso A: Estamos dentro del Shell (SPA)
      if (window.getGlobalCatalog && typeof window.getGlobalCatalog === 'function') {
        const data = await window.getGlobalCatalog();
        if (data && data.products) {
          processCatalogData(data);
          return;
        }
      }

      // Caso B: Standalone - Intentar carga rápida desde red (Fetch)
      if (CATALOG_URL && CATALOG_URL !== "undefined") {
        try {
          const response = await fetch(CATALOG_URL);
          if (response.ok) {
            const data = await response.json();
            processCatalogData(data);
            return;
          }
        } catch (e) { console.warn("Fetch catalog failed, using server fallback."); }
      }

      // Caso C: Fallback Total - Consultar a Google Apps Script
      google.script.run.withSuccessHandler(res => {
        if (res && res.success && res.catalog) {
          processCatalogData(res.catalog);
        } else if (res && res.products) { // Estructura alternativa
          processCatalogData(res);
        }
      }).tpv_obtenerCatalogoDesdeDrive();

    } catch (e) {
      console.error("Error crítico cargando catálogo:", e);
    }
  }

  function processCatalogData(data) {
    if (!data) return;

    // El catálogo puede venir como objeto {products:[]} o directamente []
    const products = data.products || data;
    if (!Array.isArray(products)) return;

    // Guardamos los objetos COMPLETOS para no perder metadatos (Material, Marca, etc)
    CATALOGO = products.map(p => {
      // Normalizamos solo las claves básicas para los selectores, pero mantenemos el resto
      p._sku = p.id || p.sku || p.CODIGO_ID;
      p._nombre = p.model || p.nombre || p.NOMBRE_PRODUCTO || "Sin Nombre";
      p._categoria = p.categoryName || p.categoria || "Sin Categoría";
      return p;
    });

    document.getElementById('stats-total').innerText = `${CATALOGO.length} Productos`;
    populateCategories();
  }

  function populateCategories() {
    const selector = document.getElementById('cat-selector');
    selector.innerHTML = '<option value="">-- Elige Categoría --</option>';

    CATEGORIAS.clear();
    CATALOGO.forEach(p => CATEGORIAS.add(p._categoria));

    [...CATEGORIAS].sort().forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      selector.appendChild(opt);
    });
  }

  function updateProductList() {
    const cat = document.getElementById('cat-selector').value;
    const selector = document.getElementById('prod-selector');
    selector.innerHTML = '<option value="">-- Selecciona Producto --</option>';

    const prods = CATALOGO.filter(p => p._categoria === cat);
    prods.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p._sku;
      opt.textContent = `[${p._sku}] ${p._nombre}`;
      selector.appendChild(opt);
    });
  }

  // 2. CARGA DE IMAGENES
  function loadProductImages() {
    const sku = document.getElementById('prod-selector').value;
    const prod = CATALOGO.find(p => p._sku === sku);
    if (!prod) {
      selectedProduct = null;
      return;
    }

    selectedProduct = prod; // Guardamos el objeto COMPLETO (con material, marca, etc)
    document.getElementById('lab-workspace').classList.remove('hidden');

    const gallery = document.getElementById('image-gallery');
    gallery.innerHTML = '<div class="col-span-2 py-4 text-center text-slate-500 animate-pulse text-[10px]">Cargando...</div>';

    google.script.run.withSuccessHandler(res => {
      let imgs = [];
      try {
        imgs = typeof res === 'string' ? JSON.parse(res) : res;
      } catch (e) {
        console.error("Error parseando imágenes:", e);
      }
      renderGallery(imgs, prod);
    }).obtenerImagenesDeProducto(sku);
  }

  function renderGallery(imgs, prod) {
    const gallery = document.getElementById('image-gallery');
    gallery.innerHTML = '';

    if (imgs.length === 0) {
      gallery.innerHTML = '<div class="col-span-2 py-4 text-center text-slate-500 text-[10px]">Sin imágenes.</div>';
      return;
    }

    imgs.forEach(img => {
      const card = document.createElement('div');
      card.className = "cursor-pointer rounded-lg overflow-hidden border-2 border-transparent hover:border-blue-500 transition-all bg-slate-900";
      card.innerHTML = `<img src="${img.THUMBNAIL_URL || img.URL}" class="w-full aspect-square object-cover opacity-80 hover:opacity-100 transition">`;
      card.onclick = () => selectImage(img, prod);
      gallery.appendChild(card);
    });
  }

  function selectImage(img, prod) {
    selectedImageId = img.IMAGEN_ID || img.ID;
    document.getElementById('selected-img-view').src = img.URL || img.THUMBNAIL_URL;
    document.getElementById('img-id-badge').innerText = `IMG-ID: ${selectedImageId}`;
    document.getElementById('prod-title-view').innerText = prod.nombre;
    document.getElementById('prod-sku-view').innerText = `SKU: ${prod.sku}`;
    document.getElementById('results-panel').classList.add('hidden');
    document.getElementById('selected-img-view').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // 3. EJECUCION CON SWAL
  function confirmAndRunTest() {
    if (!selectedImageId) return Swal.fire({
      title: 'Atención',
      text: 'Primero elige una imagen de la galería.',
      icon: 'warning',
      background: '#0f172a',
      color: '#fff'
    });

    Swal.fire({
      title: 'Iniciar Simulación',
      text: "Â¿Deseas ejecutar el diagnóstico forense transparente? Esto consumirá cuota de Gemma 4.",
      icon: 'info',
      showCancelButton: true,
      confirmButtonColor: '#3b82f6',
      cancelButtonColor: '#1e293b',
      confirmButtonText: 'Sí, analizar ahora',
      background: '#0f172a',
      color: '#fff'
    }).then((result) => {
      if (result.isConfirmed) {
        runTest();
      }
    });
  }

  function runTest() {
    const btn = document.getElementById('run-test-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="material-icons animate-spin">sync</span> PROCESANDO...`;

    const metadata = selectedProduct ? {
      brand: selectedProduct.brand,
      model: selectedProduct.model,
      category: selectedProduct.categoryName,
      parentCategory: selectedProduct.parentCategory,
      material: selectedProduct.material,
      gender: selectedProduct.gender,
      style: selectedProduct.style,
      season: selectedProduct.season
    } : null;

    google.script.run.withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = `<span class="material-icons text-sm">biotech</span> ANALIZAR PRENDA`;

      if (res.success) {
        renderResults(res);
      } else {
        Swal.fire({
          title: 'Error de Laboratorio',
          text: res.error || "Error desconocido en la simulación.",
          icon: 'error',
          background: '#0f172a',
          color: '#fff'
        });
      }
    }).ejecutarPruebaLaboratorio(selectedImageId, metadata);
  }

  function renderResults(res) {
    document.getElementById('results-panel').classList.remove('hidden');

    const rawView = document.getElementById('raw-view');
    rawView.innerHTML = '';

    res.debug.forEach(line => {
      const div = document.createElement('div');
      div.className = line.status === 'KEPT' ? 'log-kept p-1 mb-1 rounded' : 'log-discarded p-1 mb-1 opacity-40';
      div.innerText = line.text;
      rawView.appendChild(div);
    });

    const cleanView = document.getElementById('clean-view');
    cleanView.innerHTML = `<pre class="text-emerald-400 font-bold whitespace-pre-wrap font-mono text-[11px] leading-tight">${res.clean}</pre>`;

    Swal.fire({
      toast: true,
      position: 'top-end',
      icon: 'success',
      title: 'Análisis completado',
      showConfirmButton: false,
      timer: 3000,
      background: '#1e293b',
      color: '#fff'
    });
  }

  function copyToClipboard(elementId, title) {
    const el = document.getElementById(elementId);
    if (!el) return;
    
    const text = `${title}\n\n${el.innerText}`;

    // Fallback robusto para entornos de iframe (Apps Script)
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    try {
      const successful = document.execCommand('copy');
      if (successful) {
        Swal.fire({
          toast: true,
          position: 'top-end',
          icon: 'success',
          title: 'Copiado al portapapeles',
          showConfirmButton: false,
          timer: 1500,
          background: '#1e293b',
          color: '#fff'
        });
      }
    } catch (err) {
      console.error('Error al copiar:', err);
    }

    document.body.removeChild(textArea);
  }
  function resetLab() {
    document.getElementById('cat-selector').value = "";
    document.getElementById('prod-selector').innerHTML = '<option value="">Primero elige categoría</option>';
    document.getElementById('image-gallery').innerHTML = '';
    document.getElementById('selected-img-view').src = "";
    document.getElementById('img-id-badge').innerText = "IMG-ID: NO_SELECTED";
    document.getElementById('prod-title-view').innerText = "Selecciona una imagen";
    document.getElementById('prod-sku-view').innerText = "SKU: ---";
    document.getElementById('results-panel').classList.add('hidden');
    document.getElementById('lab-workspace').classList.add('hidden');
    selectedImageId = null;
    
    Swal.fire({
      toast: true,
      position: 'top-end',
      icon: 'success',
      title: 'Laboratorio reiniciado',
      showConfirmButton: false,
      timer: 2000,
      background: '#1e293b',
      color: '#fff'
    });
  }
</script>
