<script>
  // --- VARIABLES ---
  var allSalesData = [];

  var dtInstance = null, metodosPagoIcons = {}, activePaymentFilters = new Set(), isRendering = false;
  var currentTrendMode = 'month';

  var modalElement = document.getElementById('detail-modal'), modalBody = document.getElementById('modal-body-content'), loadingSpinner = document.getElementById('loading-spinner');

  // Inputs del Header & Cards
  var filterStatus = document.getElementById('filter-status'), filterOrigen = document.getElementById('filter-origen'), filterCajaDate = document.getElementById('filter-caja-date');
  var filterTipoVenta = document.getElementById('filter-tipo-venta');
  var filterDateQuick = document.getElementById('filter-date-quick'), filterDateStart = document.getElementById('filter-date-start'), filterDateEnd = document.getElementById('filter-date-end');

  // Botones de Estado
  var btnStatComplete = document.getElementById('btn-stat-complete'), btnStatPending = document.getElementById('btn-stat-pending'), btnStatCanceled = document.getElementById('btn-stat-canceled');

  // Bot\u00f3n Limpiar (FAB)

  var formatMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }), parseMonto = (val) => (typeof val === 'number' && !isNaN(val)) ? val : 0;

  // --- LOGICA DE BOTONES DE ESTADO (FILTROS MACRO) ---
  window.filterByStatusButton = function (statusGroup, btnElement) {
    if (btnElement.classList.contains('disabled')) return;
    if (filterStatus.dataset.activeMacro === statusGroup) {

    renderTable(allSalesData);
  }

  function updateStatusButtonsVisuals(counts) {
    [btnStatComplete, btnStatPending, btnStatCanceled].forEach(b => {

      b.classList.remove('ring-teal-500', 'ring-amber-500', 'ring-red-500');

    document.getElementById('summary-count-complete').textContent = counts.complete;
    document.getElementById('summary-count-pending').textContent = counts.pending;

    if (counts.complete === 0) btnStatComplete.classList.add('disabled');
    if (counts.pending === 0) btnStatPending.classList.add('disabled');
    if (counts.canceled === 0) btnStatCanceled.classList.add('disabled');

    if (macro === 'COMPLETAS') { btnStatComplete.classList.add('active-filter', 'ring-2', 'ring-offset-1', 'ring-offset-slate-900', 'ring-teal-500'); }
    if (macro === 'PENDIENTES') { btnStatPending.classList.add('active-filter', 'ring-2', 'ring-offset-1', 'ring-offset-slate-900', 'ring-amber-500'); }
    if (macro === 'CANCELADO') { btnStatCanceled.classList.add('active-filter', 'ring-2', 'ring-offset-1', 'ring-offset-slate-900', 'ring-red-500'); }

  // --- MODAL (Compactado y Adaptado a Dark Mode) ---

                    <span class="material-icons text-emerald-400 bg-emerald-500/10 p-1 rounded-md text-sm">payments</span>

                </div>
                <div class="flex flex-wrap gap-2 mb-2">
                    <span class="${s.origen === 'Blogger' ? 'badge-blogger' : 'badge-local'} text-xs">${s.origen}</span>

                </div>
                ${s.metodoPago.toLowerCase().includes('transferencia') ? `<div class="bg-blue-900/20 p-2 rounded border border-blue-500/20 text-xs text-blue-300 mb-2"><p><strong>BCO:</strong> ${s.bancoTransferencia}</p><p><strong>ALIAS:</strong> ${s.aliasTransferencia}</p></div>` : ''}
                
                <div class="flex flex-wrap gap-2 mt-2 pt-2 border-t border-slate-700">
                    ${s.pagoMixto ? '<span class="px-2 py-0.5 rounded bg-purple-500/10 text-purple-300 text-[10px] font-bold border border-purple-500/20">Pago Mixto</span>' : ''}
                    ${s.tipoVenta ? `<span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-[10px] font-bold border border-slate-600">${s.tipoVenta}</span>` : ''}
                    ${s.compraMinima > 0 ? `<span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-[10px] font-bold border border-slate-600">Min: ${s.compraMinima}</span>` : ''}
                </div>
            </div>

            <!-- TOTALS CARD (No change needed, already dark styled in original, just removed white styles) -->
            <div class="p-4 bg-slate-900 rounded-xl border border-slate-700 shadow-sm text-white flex flex-col justify-center relative overflow-hidden">
              <div class="absolute -top-6 -right-6 w-20 h-20 bg-indigo-500/10 rounded-full blur-xl"></div>
              <div class="space-y-1 text-sm mb-3 relative z-10">
                <div class="flex justify-between text-slate-400"><span>Monto Productos:</span> <span>${formatMoneda.format(s.montoProductos || 0)}</span></div>
                ${s.recargoMenor > 0 ? `<div class="flex justify-between text-orange-400"><span>Recargo Menor:</span><span>+${formatMoneda.format(s.recargoMenor)}</span></div>` : ''}
                ${s.costoEnvio > 0 ? `<div class="flex justify-between text-blue-400"><span>Env\u00edo:</span><span>+${formatMoneda.format(s.costoEnvio)}</span></div>` : ''}
                ${s.pagoEfectivo > 0 ? `<div class="flex justify-between text-emerald-400"><span>Pago Efectivo:</span><span>-${formatMoneda.format(s.pagoEfectivo)}</span></div>` : ''}
                <div class="border-b border-slate-700 my-1"></div>
                <div class="flex justify-between text-slate-200 font-bold"><span>Subtotal:</span> <span>${formatMoneda.format(s.subtotal || 0)}</span></div>
                ${s.recargoTransferencia > 0 && !s.desactivarRecargoTransferencia ? `<div class="flex justify-between text-yellow-400"><span>Recargo Transf:</span><span>+${formatMoneda.format(s.recargoTransferencia)}</span></div>` : ''}
              </div>
              <div class="pt-2 border-t border-slate-700 space-y-1 relative z-10">
                 <div class="flex justify-between items-end">
                    <span class="text-xs font-bold uppercase text-slate-500">Total a Pagar</span>
                    <span class="text-2xl font-black text-white">${formatMoneda.format(s.total)}</span>
                 </div>
              </div>
            </div></div>
            
            <!-- PRODUCTS TABLE DARK -->
            <div class="mb-4 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
                <div class="bg-slate-900/30 px-4 py-2 border-b border-slate-700 flex justify-between items-center">
                    <h4 class="font-bold text-slate-400 text-xs uppercase">Productos</h4>
                    <span class="bg-slate-700 text-white px-2 rounded-full text-xs font-bold">${s.detalles.length}</span>
                </div>
                <table class="w-full text-sm">
                    <thead class="bg-slate-900/50 text-xs font-bold text-slate-500 uppercase border-b border-slate-700">
                        <tr><th class="px-4 py-2 text-left">Desc</th><th class="px-4 py-2 text-center">Var</th><th class="px-4 py-2 text-right">Cant</th><th class="px-4 py-2 text-right">Total</th></tr>
                    </thead>
                    <tbody class="divide-y divide-slate-700/50">`;

    s.detalles.forEach(d => {
      h += `<tr class="hover:bg-slate-700/30 transition">

            <div class="bg-amber-500/10 p-3 rounded-lg border border-amber-500/20 flex items-center justify-between">

  function closeModal() { modalElement.classList.remove('active'); }
  window.updateSaleStatusInModal = function (id, est, ori) { window.updateSaleStatus(id, est, ori); }

  // --- RENDER TABLE (DataTable Powered) ---
  function renderTable(data) {
    if (isRendering) return; // SEMAFORO PARA EVITAR BUCLE INFINITO
    isRendering = true;

    try {
      const search = dtInstance ? dtInstance.search().toLowerCase() : "",
        fStat = filterStatus.value,
        fOri = filterOrigen.value,
        fTipo = filterTipoVenta.value,
        fCajaDate = document.getElementById('filter-caja-date').value;

      const dStart = filterDateStart.value ? new Date(filterDateStart.value + 'T00:00:00') : null,
        dEnd = filterDateEnd.value ? new Date(filterDateEnd.value + 'T23:59:59') : null;

      let totalGlobal = 0, cComp = 0, cPend = 0, cCanc = 0;
      const macroFilter = filterStatus.dataset.activeMacro;
      const pendingStatuses = ['SOLICITADO'];
      const completeStatuses = ['COMPLETADA', 'ENTREGADO', 'PAGADO'];

      // 1. FILTRADO L\u00c3\u201cGICO
      const filtered = data.filter(s => {
        // B\u00fasqueda Texto
        if (!(s.id.toLowerCase().includes(search) || s.nombreCliente.toLowerCase().includes(search) || s.asesor.toLowerCase().includes(search))) return false;

        // Filtros Select / Jerarqu\u00eda
        if (fOri && s.tiendaId !== fOri) return false;
        if (fTipo && s.tipoVenta !== fTipo) return false;

        if (filterNoCajaActive) {
          if (s.cajaId !== 'N/A' && s.cajaId !== 'WEB' && s.cajaId !== '' && s.cajaId !== null) return false;
        } else if (fCajaDate) {
          const meta = cajasMetadata[s.cajaId];
          if (!meta || meta.fecha !== fCajaDate) return false;
        }

        if (fStat && s.estado !== fStat) return false;

        // Multi-selecci\u00f3n de Pagos
        if (activePaymentFilters.size > 0 && !activePaymentFilters.has(s.metodoPago)) return false;

        // Fechas
        if (dStart || dEnd) {
          const sd = new Date(s.fecha.split(' ')[0] + 'T00:00:00');
          if (dStart && sd < dStart) return false;
          if (dEnd && sd > dEnd) return false;
        }

        // Macro Filtros (Status Groups)
        if (macroFilter === 'COMPLETAS' && !completeStatuses.includes(s.estado)) return false;
        if (macroFilter === 'PENDIENTES' && !pendingStatuses.includes(s.estado)) return false;
        if (macroFilter === 'CANCELADO' && s.estado !== 'CANCELADO') return false;

        // Conteos para botones
        if (completeStatuses.includes(s.estado)) { cComp++; totalGlobal += s.total + (s.pagoEfectivo || 0); }
        else if (pendingStatuses.includes(s.estado)) cPend++;
        else if (s.estado === 'CANCELADO') cCanc++;

        return true;
      });

      // 2. ACTUALIZAR UI ESTATICA
      updateStatusButtonsVisuals({ complete: cComp, pending: cPend, canceled: cCanc });
      document.getElementById('summary-total-audited-monto').textContent = formatMoneda.format(totalGlobal);
      renderCharts(calculateChartData(filtered));
      renderRanking(calculateProductRanking(filtered));

      // 3. ACTUALIZAR DATATABLE
      if (dtInstance) {
        dtInstance.clear().rows.add(filtered).draw(false);
      }

      if (search || fStat || fOri || fTipo || fCajaDate || dStart || dEnd || activePaymentFilters.size > 0) {
        if (fabClearBtn) fabClearBtn.classList.remove('hidden');
      } else {
        if (fabClearBtn) fabClearBtn.classList.add('hidden');
      }
    } catch (e) {
      console.error("Error en renderTable:", e);
    } finally {
      // Desbloqueamos el sem\u00e1foro SIEMPRE al terminar, haya error o no
      isRendering = false;
    }
  }

  function initDataTable() {
    try {
      // Destruir si ya existe para evitar errores de re-inicializaci\u00f3n
      if ($.fn.DataTable.isDataTable('#salesTable')) {
        $('#salesTable').DataTable().destroy();
      }

      dtInstance = $('#salesTable').DataTable({
        responsive: true,
        data: [],
        order: [[1, 'desc']],
        // En DataTables 2.0, si el layout falla, usamos dom como fallback compatible
        layout: {
          topStart: 'buttons',
          topEnd: 'search'
        },
        buttons: [
          {
            extend: 'csv',
            text: '<span class="material-icons text-sm">download</span> CSV',
            className: 'dt-button !bg-slate-800 !border-slate-700 !text-slate-300 hover:!bg-slate-700'
          },
          {
            extend: 'pdf',
            text: '<span class="material-icons text-sm">picture_as_pdf</span> PDF',
            className: 'dt-button !bg-slate-800 !border-slate-700 !text-slate-300 hover:!bg-slate-700',
            orientation: 'landscape',
            pageSize: 'A4'
          },
          {
            extend: 'print',
            text: '<span class="material-icons text-sm">print</span> Imprimir',
            className: 'dt-button !bg-slate-800 !border-slate-700 !text-slate-300 hover:!bg-slate-700'
          }
        ],
        language: {
          search: "",
          searchPlaceholder: "Buscar venta...",
          lengthMenu: "Mostrar _MENU_",
          info: "Mostrando _START_ a _END_ de _TOTAL_ ventas",
          infoEmpty: "No hay ventas para mostrar",
          infoFiltered: "(filtrado de _MAX_ totales)",
          paginate: { first: "\u00c2\u00ab", last: "\u00c2\u00bb", next: "Sig", previous: "Prev" },
          emptyTable: "No se encontraron datos en el rango seleccionado"
        },
        columns: [
          {
            data: null,
            className: 'text-center',
            render: function (data) {
              return `<div class="flex items-center justify-center gap-2">
                <button onclick="openModal('${data.id}')" class="p-1.5 bg-slate-800 border border-slate-600 rounded-lg text-indigo-400 hover:bg-indigo-600 hover:text-white transition shadow-sm">
                  <span class="material-icons text-sm">visibility</span>
                </button>
                <select class="bg-slate-800 border border-slate-600 text-slate-300 text-[10px] rounded py-1 px-1 outline-none cursor-pointer w-20 md:w-auto" onchange="window.updateSaleStatus('${data.id}', this.value, '${data.origen}')">
                  <option value="" disabled selected>Estado</option>
                  <option value="SOLICITADO">Solicitado</option>
                  <option value="EDITADO">Editado</option>
                  <option value="PAGADO">Pagado</option>
                  <option value="EN CAMINO">En Camino</option>
                  <option value="ENTREGADO">Entregado</option>
                  <option value="CANCELADO">Cancelado</option>
                </select>
              </div>`;
            }
          },
          { data: 'id', className: 'text-[10px] font-mono text-slate-500' },
          {
            data: null,
            render: function (data) {
              return `<div>
                <div class="font-bold text-slate-200 text-xs truncate max-w-[120px] md:max-w-none">${data.nombreCliente}</div>
                <div class="text-[10px] text-slate-500">${data.fecha.split(' ')[0]} | <span class="text-indigo-400">${data.asesor}</span></div>
              </div>`;
            }
          },
          {
            data: 'total',
            className: 'text-right font-black text-white text-xs',
            render: v => formatMoneda.format(v)
          },
          {
            data: null,
            className: 'text-center',
            render: function (data) {
              return `<div class="flex flex-col items-center gap-1">
                <span class="${data.origen === 'Blogger' ? 'badge-blogger' : 'badge-local'} text-[9px] py-0.5 px-1.5 inline-block w-fit">${data.tiendaId}</span>
                <div class="flex gap-1 items-center">
                  <span class="text-[8px] bg-slate-800 text-slate-500 border border-slate-700 px-1 rounded font-bold">${data.tipoVenta}</span>
                  <span class="text-[9px] uppercase font-bold text-slate-400 truncate max-w-[60px]">${data.metodoPago}</span>
                </div>
              </div>`;
            }
          },
          {
            data: 'estado',
            className: 'text-center',
            render: function (st) {
              let cls = '';
              if (['SOLICITADO', 'EDITADO'].includes(st)) cls = 'bg-amber-500/10 text-amber-500 border border-amber-500/20';
              else if (st === 'PAGADO') cls = 'bg-blue-500/10 text-blue-400 border border-blue-500/20';
              else if (st === 'CANCELADO') cls = 'bg-red-500/10 text-red-500 border border-red-500/20';
              else cls = 'bg-teal-500/10 text-teal-400 border border-teal-500/20';
              return `<span class="status-pill ${cls}">${st}</span>`;
            }
          }
        ]
      });

      dtInstance.on('search.dt', function () {
        // Solo re-renderizamos anal\u00edticas si NO estamos en medio de un proceso de redibujo
        if (!isRendering) renderTable(allSalesData);
      });
    } catch (e) {
      console.error('Error initializing DataTable:', e);
    }
  }

  // --- DATA & FILTERS ---
  function loadSalesData(force) {
    if (allSalesData.length && !force) { renderTable(allSalesData); return; }

    // Si estamos en el Shell, usamos el estado global para una carga m\u00e1s limpia
    if (typeof setGlobalStatus === 'function') {
      setGlobalStatus(true, "Cloud Drive Sync...");
    } else {
      loadingSpinner.classList.remove('hidden');
    }

    google.script.run.withSuccessHandler(resRaw => {
      if (typeof setGlobalStatus === 'function') setGlobalStatus(false);
      loadingSpinner.classList.add('hidden');
      if (!resRaw) { showStatus('Error: Payload vac\u00edo o corrupto enviado por el servidor.', 'error'); return; }

      let res = resRaw;
      if (typeof resRaw === 'string') {
        try { res = JSON.parse(resRaw); }
        catch (e) { showStatus('Error parsing datos del servidor', 'error'); return; }
      }

      if (res.success) {
        fullHierarchy = res.hierarchy || {};
        cajasMetadata = res.cajasMetadata || {};
        productImageMap = res.productImageMap || {};

        // Aplanar Jerarqu\u00eda para la tabla inicial
        allSalesData = [];
        Object.keys(fullHierarchy).forEach(ori => {
          Object.keys(fullHierarchy[ori]).forEach(boxId => {
            const salesInBox = fullHierarchy[ori][boxId].map(s => {
              s.total = parseMonto(s.total); s.costoEnvio = parseMonto(s.costoEnvio);
              s.recargoTransferencia = parseMonto(s.recargoTransferencia); s.recargoMenor = parseMonto(s.recargoMenor);
              s.pagoEfectivo = parseMonto(s.pagoEfectivo); s.montoProductos = parseMonto(s.montoProductos);
              s.subtotal = parseMonto(s.subtotal); s.compraMinima = parseMonto(s.compraMinima);
              s.detalles = s.detalles.map(d => ({ ...d, precioUnitario: parseMonto(d.precioUnitario), subtotal: parseMonto(d.subtotal) }));
              return s;
            });
            allSalesData = allSalesData.concat(salesInBox);
          });
        });

        // Ordenar por fecha descendente
        allSalesData.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        populateFilters(res.filterOptions);

        if (!filterDateStart.value) {
          setDateRange('today', false);
        }

        renderTable(allSalesData);
        showStatus(`Datos sincronizados`, 'success');
      } else showStatus(res.message, 'error');
    }).withFailureHandler(err => { loadingSpinner.classList.add('hidden'); showStatus(err.message, 'error'); }).cargarDashboardVentas(force);
  }

  function populateFilters(o) {
    const fill = (el, a) => { el.innerHTML = `<option value="">${el.options[0].text}</option>` + a.map(x => `<option value="${x}">${x}</option>`).join(''); };
    fill(filterOrigen, o.origenes);
    if (o.tiposVenta) fill(filterTipoVenta, o.tiposVenta);

    // Renderizar iconos de pago
    const container = document.getElementById('payment-icons-container');
    container.innerHTML = '';
    metodosPagoIcons = o.metodosPagoIcons || {};

    o.metodosPago.forEach(m => {
      const iconData = metodosPagoIcons[m];
      if (iconData && (iconData.svg || iconData.iconUrl)) {
        const btn = document.createElement('div');
        btn.className = `payment-icon-filter ${activePaymentFilters.has(m) ? 'active' : ''}`;
        btn.title = m;

        const iconUrl = iconData.iconUrl || "";
        const iconStyle = iconUrl ? `background-image: url('${iconUrl}');` : '';
        const iconElement = iconUrl ? `<div style="${iconStyle}"></div>` : (iconData.svg || '');

        btn.innerHTML = iconElement + "<span>" + m + "</span>";
        btn.onclick = () => {
          if (activePaymentFilters.has(m)) activePaymentFilters.delete(m);
          else activePaymentFilters.add(m);
          btn.classList.toggle('active');
          renderTable(allSalesData);
        };
        container.appendChild(btn);
      }
    });
  }
  window.setDateRange = function (v, shouldRender = true) {
    const n = new Date();
    const fmt = d => d.toISOString().split('T')[0];

    if (v === 'today') { filterDateStart.value = fmt(n); filterDateEnd.value = fmt(n); currentTrendMode = 'today'; }
    else if (v === 'yesterday') { const p = new Date(); p.setDate(n.getDate() - 1); filterDateStart.value = fmt(p); filterDateEnd.value = fmt(p); currentTrendMode = 'yesterday'; }
    else if (v === 'week') { const p = new Date(); p.setDate(n.getDate() - 7); filterDateStart.value = fmt(p); filterDateEnd.value = fmt(n); currentTrendMode = 'week'; }
    else if (v === 'month') { const f = new Date(n.getFullYear(), n.getMonth(), 1); filterDateStart.value = fmt(f); filterDateEnd.value = fmt(n); currentTrendMode = 'month'; }
    else if (v === 'year') { const f = new Date(n.getFullYear(), 0, 1); filterDateStart.value = fmt(f); filterDateEnd.value = fmt(n); currentTrendMode = 'year'; }
    else if (v === 'history') { filterDateStart.value = ''; filterDateEnd.value = ''; currentTrendMode = 'history'; }
    else { currentTrendMode = 'manual'; }

    // Actualizar texto de rango en el header
    const display = document.getElementById('display-date-range');
    if (display) {
      if (currentTrendMode === 'today') display.textContent = 'Hoy';
      else if (currentTrendMode === 'yesterday') display.textContent = 'Ayer';
      else if (filterDateStart.value && filterDateEnd.value) {
        const d1 = filterDateStart.value.split('-').reverse().slice(0, 2).join('/');
        const d2 = filterDateEnd.value.split('-').reverse().slice(0, 2).join('/');
        display.textContent = `${d1} - ${d2}`;
      } else display.textContent = 'Manual';
    }

    syncTrendButtons(currentTrendMode);
    if (shouldRender) renderTable(allSalesData);
  }

  window.syncTrendButtons = function (mode) {
    document.querySelectorAll('.trend-btn').forEach(b => {
      b.classList.remove('active');
      if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${mode}'`)) b.classList.add('active');
    });
  }

  filterDateStart.addEventListener('change', () => { currentTrendMode = 'manual'; filterDateQuick.value = ''; filterCajaDate.value = ''; syncTrendButtons('manual'); renderTable(allSalesData); });
  filterDateEnd.addEventListener('change', () => { currentTrendMode = 'manual'; filterDateQuick.value = ''; filterCajaDate.value = ''; syncTrendButtons('manual'); renderTable(allSalesData); });
  filterOrigen.addEventListener('change', () => { renderTable(allSalesData); });
  filterTipoVenta.addEventListener('change', () => { renderTable(allSalesData); });
  document.getElementById('filter-caja-date').addEventListener('change', () => {
    if (filterNoCajaActive) toggleNoCajaFilter();
    currentTrendMode = 'manual';
    syncTrendButtons('manual');
    renderTable(allSalesData);
  });

  window.toggleNoCajaFilter = function () {
    filterNoCajaActive = !filterNoCajaActive;
    const btn = document.getElementById('btn-filter-no-caja');
    const inputDate = document.getElementById('filter-caja-date');

    if (filterNoCajaActive) {
      btn.classList.replace('bg-slate-800', 'bg-amber-500/20');
      btn.classList.replace('text-slate-400', 'text-amber-500');
      inputDate.value = ''; // Limpiar fecha si activamos este modo
    } else {
      btn.classList.replace('bg-amber-500/20', 'bg-slate-800');
      btn.classList.replace('text-amber-500', 'text-slate-400');
    }
    renderTable(allSalesData);
  }

  window.updateSaleStatus = function (id, st, ori) {
    if (!id || !st) return;

    if (typeof setGlobalStatus === 'function') {
      setGlobalStatus(true, "Pushing to Cloud...");
    } else {
      loadingSpinner.classList.remove('hidden');
    }

    google.script.run.withSuccessHandler(r => {
      if (typeof setGlobalStatus === 'function') setGlobalStatus(false);
      loadingSpinner.classList.add('hidden');
      if (r && r.success) {
        const i = allSalesData.findIndex(x => x.id === id);
        if (i !== -1) {
          allSalesData[i].estado = st;
          renderTable(allSalesData);
          showStatus('Actualizado', 'success');
        }
      } else {
        showStatus(r ? r.message : 'Error desconocido', 'error');
      }
    }).actualizarEstadoVenta(id, st, ori);
  };

  window.clearAllFilters = function () {
    if (dtInstance) dtInstance.search('').draw();
    filterStatus.value = '';
    filterStatus.dataset.activeMacro = '';
    filterDateStart.value = '';
    filterDateEnd.value = '';
    filterCajaDate.value = '';
    filterOrigen.value = '';
    filterTipoVenta.value = '';
    filterNoCajaActive = false;
    const btnNoCaja = document.getElementById('btn-filter-no-caja');
    btnNoCaja.classList.replace('bg-amber-500/20', 'bg-slate-800');
    btnNoCaja.classList.replace('text-amber-500', 'text-slate-400');

    filterDateQuick.value = '';
    filterDateEnd.value = '';
    activePaymentFilters.clear();
    document.querySelectorAll('.payment-icon-filter').forEach(i => i.classList.remove('active'));
    renderTable(allSalesData);
  }

  // --- ANALYTICS & UI HELPERS ---
  function showStatus(m, t) { const e = document.getElementById('status-message'); e.innerHTML = t === 'success' ? `<span class="material-icons">check_circle</span> ${m}` : `<span class="material-icons">error</span> ${m}`; e.className = `fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-xl text-white font-medium text-sm transition-all duration-300 z-[110] flex items-center gap-2 ${t === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`; e.classList.remove('hidden'); setTimeout(() => e.classList.add('hidden'), 3000); }

  function calculateProductRanking(d) {
    const m = new Map();
    d.filter(s => ['COMPLETADA', 'ENTREGADO', 'PAGADO'].includes(s.estado)).forEach(s => s.detalles.forEach(x => {
      if (x.productoId) m.set(x.productoId, (m.get(x.productoId) || 0) + Number(x.cantidad));
    }));
    return Array.from(m.entries()).map(e => ({ id: e[0], qty: e[1], img: productImageMap[e[0]] || 'https://placehold.co/40x40' })).sort((a, b) => b.qty - a.qty).slice(0, 5);
  }

  function renderRanking(d) {
    const c = document.getElementById('ranking-list');
    c.innerHTML = '';
    if (!d.length) { c.innerHTML = '<p class="text-center text-xs text-slate-500 mt-4">Sin datos</p>'; return; }
    d.forEach((i, x) => c.innerHTML += `<div class="flex items-center gap-3 p-2 hover:bg-slate-700/50 rounded-lg"><div class="w-6 h-6 flex justify-center items-center rounded-full text-xs font-bold ${x === 0 ? 'bg-amber-500/20 text-amber-500' : 'bg-slate-700 text-slate-400'}">${x + 1}</div><img src="${i.img}" class="w-8 h-8 rounded border border-slate-600 bg-slate-800"><div class="flex-1 truncate text-xs font-bold text-slate-300">${i.id}</div><span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 rounded-full font-bold">${i.qty}</span></div>`);
  }

  function calculateChartData(d) {
    const T = new Map(), O = new Map(), P = new Map();
    const now = new Date();

    // Configuraci\u00f3n de l\u00edmites de tiempo seg\u00fan modo
    let startTime, endTime;
    if (currentTrendMode === 'today') {
      startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    } else if (currentTrendMode === 'yesterday') {
      startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 23, 59, 59);
    } else if (currentTrendMode === 'week') {
      startTime = new Date(now); startTime.setDate(now.getDate() - 7);
      endTime = new Date(now);
    } else if (currentTrendMode === 'month') {
      startTime = new Date(now.getFullYear(), now.getMonth(), 1);
      endTime = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
    } else if (currentTrendMode === 'year') {
      startTime = new Date(now.getFullYear(), 0, 1);
      endTime = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
    } else if (currentTrendMode === 'history') {
      startTime = null;
      endTime = null;
    }

    // Modo Manual: Tomar fechas de los filtros globales
    if (currentTrendMode === 'manual' || !currentTrendMode) {
      startTime = filterDateStart.value ? new Date(filterDateStart.value + 'T00:00:00') : null;
      endTime = filterDateEnd.value ? new Date(filterDateEnd.value + 'T23:59:59') : null;
    }

    const diffDays = (startTime && endTime) ? Math.ceil(Math.abs(endTime - startTime) / (1000 * 60 * 60 * 24)) : 0;
    const isSingleDay = (startTime && endTime && startTime.toISOString().split('T')[0] === endTime.toISOString().split('T')[0]);

    const completeStatuses = ['COMPLETADA', 'ENTREGADO', 'PAGADO'];

      // 1. Filtrado y Agrupaci\u00f3n
      d.filter(s => completeStatuses.includes(s.estado)).forEach(s => {
        // Normalizaci\u00f3n robusta de la fecha (manejo de guiones y espacios)
        const datePart = s.fecha.split(' ')[0].replace(/-/g, '/');
        const timePart = s.fecha.split(' ')[1] || '00:00';
        const sDate = new Date(`${datePart} ${timePart}`);

        const grossTotal = s.total + (s.pagoEfectivo || 0);

        // Filtro de rango de tiempo (Solo si hay l\u00edmites definidos)
        if (startTime && sDate < startTime) return;
        if (endTime && sDate > endTime) return;

        // 1. L\u00f3gica de Agrupaci\u00f3n para Tendencia (X-Axis)
        let key;
        if (currentTrendMode === 'today' || currentTrendMode === 'yesterday' || isSingleDay) {
          key = sDate.getHours().toString().padStart(2, '0') + ':00';
        } else if (currentTrendMode === 'week') {
          const days = ['Dom', 'Lun', 'Mar', 'Mi\u00e9', 'Jue', 'Vie', 'S\u00e1b'];
          key = days[sDate.getDay()];
        } else if (currentTrendMode === 'month') {
          key = sDate.getDate().toString();
        } else if (currentTrendMode === 'year') {
          const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
          key = months[sDate.getMonth()];
        } else if (currentTrendMode === 'history') {
          // Hist\u00f3rico siempre agrupa por Mes A\u00f1o para visi\u00f3n de largo plazo
          const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
          key = `${months[sDate.getMonth()]} ${sDate.getFullYear().toString().slice(-2)}`;
        } else {
          // Modo manual inteligente:
          if (isSingleDay) {
            key = sDate.getHours().toString().padStart(2, '0') + ':00';
          } else {
            const diff = (startTime && endTime) ? Math.ceil(Math.abs(endTime - startTime) / (1000 * 60 * 60 * 24)) : 0;
            if (diff > 60) {
              const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
              key = `${months[sDate.getMonth()]} ${sDate.getFullYear().toString().slice(-2)}`;
            } else {
              key = s.fecha.split(' ')[0];
            }
          }
        }

        T.set(key, (T.get(key) || 0) + grossTotal);

        // 2. Origen y Pago (Siempre igual)
        O.set(s.tiendaId || 'N/A', (O.get(s.tiendaId) || 0) + grossTotal);
        P.set(s.metodoPago || 'N/A', (P.get(s.metodoPago) || 0) + grossTotal);
      });

      // Post-procesamiento de Tendencia para asegurar orden y ceros
      let trendData = [];
      if (currentTrendMode === 'today' || currentTrendMode === 'yesterday' || (currentTrendMode === 'manual' && isSingleDay)) {
        for (let i = 0; i < 24; i++) {
          const h = i.toString().padStart(2, '0') + ':00';
          trendData.push([h, T.get(h) || 0]);
        }
      } else if (currentTrendMode === 'week') {
        const days = ['Dom', 'Lun', 'Mar', 'Mi\u00e9', 'Jue', 'Vie', 'S\u00e1b'];
        // Reordenar para que empiece desde hace 7 d\u00edas
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const dayLabel = days[d.getDay()];
          trendData.push([dayLabel, T.get(dayLabel) || 0]);
        }
      } else if (currentTrendMode === 'month') {
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for (let i = 1; i <= lastDay; i++) {
          trendData.push([i.toString(), T.get(i.toString()) || 0]);
        }
      } else {
        // Ordenamiento Cronol\u00f3gico Robusto
        const monthMap = { 'Ene': 0, 'Feb': 1, 'Mar': 2, 'Abr': 3, 'May': 4, 'Jun': 5, 'Jul': 6, 'Ago': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dic': 11 };
        trendData = Array.from(T.entries()).sort((a, b) => {
          const partsA = a[0].split(' '), partsB = b[0].split(' ');
          const yearA = partsA[1] ? 2000 + parseInt(partsA[1]) : now.getFullYear();
          const yearB = partsB[1] ? 2000 + parseInt(partsB[1]) : now.getFullYear();
          const dateA = new Date(yearA, monthMap[partsA[0]], 1);
          const dateB = new Date(yearB, monthMap[partsB[0]], 1);
          return dateA - dateB;
        });
      }

      return {
        trend: trendData,
        origin: Array.from(O.entries()),
        payment: Array.from(P.entries())
      };
    }

    window.setTrendMode = function (mode, btn) {
      currentTrendMode = mode;
      // Solo limpiamos fechas para el modo HIST\u00c3\u201cRICO TOTAL
      if (mode === 'history') {
        filterDateStart.value = '';
        filterDateEnd.value = '';
      }
      setDateRange(mode, true);
    }

    function renderCharts(c) {
      if (typeof Chart === 'undefined') return;

      // M\u00e9todo ultra-seguro para destruir gr\u00e1ficos previos por ID de Canvas
      ['dailySalesChart', 'salesByOriginChart', 'paymentMethodChart'].forEach(id => {
        const existingChart = Chart.getChart(id);
        if (existingChart) existingChart.destroy();
      });

      const dailyEl = document.getElementById('dailySalesChart');
      if (dailyEl) {
        // Configuraci\u00f3n din\u00e1mica de colores para el modo Mes y A\u00f1o
        let bgColors = 'rgba(99,102,241,0.1)';
        let borderColors = '#6366f1';
        let pointColors = '#6366f1';

        if (currentTrendMode === 'month') {
          // Colores por semana del mes
          bgColors = c.trend.map((_, i) => {
            const day = i + 1;
            if (day <= 7) return 'rgba(99,102,241,0.2)';
            if (day <= 14) return 'rgba(16,185,129,0.2)';
            if (day <= 21) return 'rgba(245,158,11,0.2)';
            return 'rgba(236,72,153,0.2)';
          });
          borderColors = c.trend.map((_, i) => {
            const day = i + 1;
            if (day <= 7) return '#6366f1';
            if (day <= 14) return '#10b981';
            if (day <= 21) return '#f59e0b';
            return '#ec4899';
          });
        } else if (currentTrendMode === 'manual' || currentTrendMode === 'year' || currentTrendMode === 'history') {
          // Colores por A\u00f1o: 23 (Esmeralda), 24 (Indigo), 25 (Ambar)
          borderColors = c.trend.map(t => {
            const yr = t[0].split(' ').pop();
            return yr === '23' ? '#10b981' : (yr === '25' ? '#f59e0b' : '#6366f1');
          });
          bgColors = borderColors.map(c => c + '33');
        }

        chartInstances.daily = new Chart(dailyEl, {
          type: (currentTrendMode === 'month' || currentTrendMode === 'year') ? 'bar' : 'line',
          data: {
            labels: c.trend.map(d => d[0]),
            datasets: [{
              data: c.trend.map(d => d[1]),
              borderColor: borderColors,
              backgroundColor: bgColors,
              fill: true,
              tension: 0.4,
              pointRadius: (currentTrendMode === 'month' || currentTrendMode === 'year') ? 0 : 5,
              pointBackgroundColor: borderColors,
              borderWidth: 3,
              segment: {
                borderColor: ctx => {
                  const label = ctx.p0.label || '';
                  const yr = label.split(' ').pop();
                  return yr === '23' ? '#10b981' : (yr === '25' ? '#f59e0b' : '#6366f1');
                }
              }
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b',
                titleColor: '#94a3b8',
                bodyColor: '#fff',
                borderColor: '#334155',
                borderWidth: 1,
                padding: 10,
                displayColors: true,
                callbacks: { label: x => ' Ventas: ' + formatMoneda.format(x.raw) }
              }
            },
            scales: {
              x: {
                display: true,
                ticks: { font: { size: 9, weight: 'bold' }, color: '#94a3b8', maxRotation: 0 },
                grid: { display: false }
              },
              y: {
                display: true,
                beginAtZero: true,
                ticks: {
                  font: { size: 9 },
                  color: '#64748b',
                  callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v
                },
                grid: { color: 'rgba(51, 65, 85, 0.3)', borderDash: [4, 4] }
              }
            }
          }
        });
      }

      const originEl = document.getElementById('salesByOriginChart');
      if (originEl) chartInstances.origin = new Chart(originEl, {
        type: 'bar',
        data: { labels: c.origin.map(d => d[0]), datasets: [{ data: c.origin.map(d => d[1]), backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ec4899'] }] },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          onClick: (e, activeEls) => {
            if (activeEls.length > 0) {
              const idx = activeEls[0].index;
              const label = c.origin[idx][0];
              filterOrigen.value = label;
              renderTable(allSalesData);
            }
          },
          plugins: { legend: { display: false } },
          scales: { x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, y: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
        }
      });

      const paymentEl = document.getElementById('paymentMethodChart');
      if (paymentEl) chartInstances.payment = new Chart(paymentEl, {
        type: 'doughnut',
        data: { labels: c.payment.map(d => d[0]), datasets: [{ data: c.payment.map(d => d[1]), backgroundColor: ['#34d399', '#60a5fa', '#f87171', '#fbbf24'], borderColor: '#1e293b', borderWidth: 2 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: (e, activeEls) => {
            if (activeEls.length > 0) {
              const idx = activeEls[0].index;
              const label = c.payment[idx][0];
              if (activePaymentFilters.has(label)) activePaymentFilters.delete(label);
              else activePaymentFilters.add(label);
              // Sincronizar UI de iconos si existen
              document.querySelectorAll('.payment-icon-filter').forEach(btn => {
                if (btn.title === label) btn.classList.toggle('active');
              });
              renderTable(allSalesData);
            }
          },
          plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 9 }, color: '#cbd5e1' } } }
        }
      });
    }

    // --- INICIALIZACION ASINCRONA ---
    var initAttempts = 0;
    function initDashboard() {
      if (typeof Chart === 'undefined' || typeof $ === 'undefined' || !$.fn.DataTable) {
        initAttempts++;
        if (initAttempts > 100) { // Aumentado a 10s
          console.warn('Advertencia: Librer\u00edas demorando... forzando carga de datos.');
          loadSalesData(true);
          return;
        }
        setTimeout(initDashboard, 100);
        return;
      }
      initDataTable();
      Chart.defaults.color = '#94a3b8';
      loadSalesData();
      
      // Mostrar el contenedor con suavidad una vez inicializado
      setTimeout(() => {
        const container = document.getElementById('main-sales-container');
        if (container) container.classList.remove('opacity-0');
      }, 300);
    }
    initDashboard();
</script>
